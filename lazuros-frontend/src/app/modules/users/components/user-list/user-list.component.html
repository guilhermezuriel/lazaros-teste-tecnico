<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Usuários</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="actions-bar">
        <button mat-raised-button color="primary" (click)="openCreateDialog()">
          <mat-icon>add</mat-icon>
          Novo Usuário
        </button>
      </div>

      <div *ngIf="isLoading" class="loading">
        <mat-spinner></mat-spinner>
      </div>

      <div *ngIf="!isLoading && users.length === 0" class="empty-state">
        <mat-icon>people_outline</mat-icon>
        <p>Nenhum usuário cadastrado</p>
      </div>

      <table mat-table [dataSource]="users" *ngIf="!isLoading && users.length > 0" class="mat-elevation-z2">
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let user">{{ user.nome }}</td>
        </ng-container>

        <ng-container matColumnDef="perfis">
          <th mat-header-cell *matHeaderCellDef>Perfis</th>
          <td mat-cell *matCellDef="let user">
            <mat-chip-list>
              <mat-chip *ngFor="let perfil of user.perfis" color="accent" selected>
                {{ perfil.descricao }}
              </mat-chip>
            </mat-chip-list>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-column">Ações</th>
          <td mat-cell *matCellDef="let user" class="actions-column">
            <button mat-icon-button color="primary" (click)="openEditDialog(user)" title="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteUser(user)" title="Excluir">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
