spring:
  application:
    name: lazuros-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/lazuros
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  modulith:
    detection-strategy: direct-sub-packages

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.guilhermezuriel.lazurosbackend: DEBUG
    org.springframework.modulith: INFO
